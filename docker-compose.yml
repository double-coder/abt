services:
  postgres:
    image: postgres:15
    environment:
      - POSTGRES_USER=dbt_user
      - POSTGRES_PASSWORD=dbt_password
      - POSTGRES_DB=dbt_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dbt_user -d dbt_db"]
      interval: 10s
      timeout: 5s
      retries: 5
  dbt:
    build: .
    volumes:
      - .:/usr/app          # ✅ absolute path with leading /
      - ~/.dbt:/root/.dbt 
    environment:
      - DBT_PROFILES_DIR=/usr/app
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=dbt_user
      - DB_PASSWORD=dbt_password
      - DB_NAME=dbt_db
    depends_on:
      postgres:
        condition: service_healthy
    entrypoint: ["tail", "-f", "/dev/null"]
volumes:
  postgres_data:

